name: Build and Check
on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'docs/**'
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  build:
    with:
      source: docs
    name: Build
    uses: Logius-standaarden/Automatisering/.github/workflows/build.yml@snapshot-in-repo
  check:
    needs: build
    name: Check
    uses: Logius-standaarden/Automatisering/.github/workflows/check.yml@main    
