name: Documentation CI

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "docs/**"

  pull_request:
    paths:
      - "docs/**"

permissions:
  contents: read

jobs:

  build:
    name: Build documentation
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install markdown tools
        run: |
          npm install -g markdownlint-cli
          npm install -g @stoplight/spectral-cli

      - name: Lint Markdown
        run: |
          markdownlint docs/**/*.md

      - name: Validate OpenAPI
        run: |
          if ls docs/**/*.yaml 1> /dev/null 2>&1; then
            spectral lint docs/**/*.yaml
          fi

  check-links:
    name: Check documentation links
    runs-on: ubuntu-latest
    needs: build

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Link checker
        uses: lycheeverse/lychee-action@v1
        with:
          args: >
            docs/**/*.md
            --no-progress
            --exclude-mail

  publish:
    name: Publish GitBook
    runs-on: ubuntu-latest
    needs: [build, check-links]

    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Publish docs to GitBook
        uses: Logius-standaarden/Automatisering/.github/workflows/publish.yml@main
        secrets: inherit
