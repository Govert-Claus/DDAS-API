name: Build and publish specification

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build site with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: .
          destination: ./_site

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site


  generate-pdf:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install puppeteer
        run: |
          npm init -y
          npm install puppeteer

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Download Logius PDF script
        run: |
          wget https://raw.githubusercontent.com/Logius-standaarden/Automatisering/main/scripts/pdf.js

      - name: Start server
        run: |
          python3 -m http.server 8080 --directory _site &
          sleep 5

      - name: Generate PDF
        run: |
          export PUPPETEER_EXECUTABLE_PATH=/usr/bin/google-chrome
          node pdf.js http://localhost:8080/

      - name: Move PDF into site
        run: |
          mv *.pdf _site/

      - name: Upload updated artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site


  publish:
    needs: generate-pdf
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
