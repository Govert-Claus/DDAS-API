<!DOCTYPE html>
<html lang="nl">

<head>
  <meta content="text/html; charset=utf-8" http-equiv="content-type">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <script src="https://cdn.jsdelivr.net/gh/digitalbazaar/respec-mermaid@1.0.1/dist/main.js" class="remove"></script>
  <script src="https://vng-realisatie.github.io/VNG-R-Respec-Organization-configurations/js/organisation-config.js" class="remove"></script>
  <script src="js/config.js" class="remove"></script>
  <script class="remove"> respecConfig = {...organisationConfig, ...respecConfig}</script>
  <script>document.title = respecConfig.title</script>
  <title>Default</title>
  <link rel="shortcut icon" type="image/x-icon" href="https://vng-realisatie.github.io/VNG-R-Respec-Organization-configurations/media/logo-VNG-Realisatie.ico" />
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist/swagger-ui.css">
  <script src="https://gitdocumentatie.logius.nl/publicatie/respec/builds/respec-nlgov.js" class="remove"></script>
  <!-- De volgende style is noodzakelijk voor de werking van imagemaps. -->
  <style>
	.figure img,    .sidefigure img,    figure img,
	.figure object, .sidefigure object, figure object {
		max-width: none !important;
	}
  </style>
</head>

<body>
  <section id="abstract" data-include-format="markdown" data-include="readme.md"></section>
  <section id="sotd"></section><!-- Wordt automatisch ingevuld met een standaard tekst afhankelijk van de waarde van de property 'specStatus'. -->
  <section id="kaders" data-include-format="markdown" data-include="docs/uitgangspunten.md"></section>
  <section id="overzicht" data-include-format="markdown" data-include="docs/overzicht.md"></section>
  <section id="transport" data-include-format="markdown" data-include="docs/transport.md"></section>
  <section id="iam" data-include-format="markdown" data-include="docs/iam.md"></section>
  <section id="sign" data-include-format="markdown" data-include="docs/signing-encryptie.md"></section>
  <section id="messages" data-include-format="markdown" data-include="docs/berichten.md"></section>
  <section id="non-func" data-include-format="markdown" data-include="docs/non-functionals.md"></section>
  <script>
    let content = "";

    const getClass = function(key) {
      if (respecConfig.content[key]!==""){return ` class="${respecConfig.content[key]}"`}
    }

    for (let contentKey in respecConfig.content) {
      content += `<section data-include-format="markdown" data-include="${contentKey}.md" ${getClass(contentKey)||""}></section>`
    }

    document.getElementById("probl").insertAdjacentHTML('afterend', content);
  </script>
  <section id='tof'></section>

  <script src="https://unpkg.com/swagger-ui-dist/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist/swagger-ui-standalone-preset.js"></script>

  <script>
  document.addEventListener("respecDone", () => {
    window.respecReady = true;

    const shv = document.getElementById("swagger-shv");
    if (shv) {
      SwaggerUIBundle({
        url: "docs/api/v0.2/DDAS-SHV_v0.2.3.yaml",
        domNode: shv,
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        layout: "BaseLayout"
      });
    }

    const vs = document.getElementById("swagger-vs");
    if (vs) {
      SwaggerUIBundle({
        url: "docs/api/v0.2/DDAS-VS_v0.2.3.yaml",
        domNode: vs,
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        layout: "BaseLayout"
      });
    }
  });
  </script>

</body>


</html>
